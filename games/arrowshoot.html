<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0a0a1a, #1a1a3a);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }
       .game-container { text-align: center; }
        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700;
        }
       .win-condition {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }
       .stats {
            display: flex;
            justify-content: space-around;
            width: 350px;
            margin: 10px auto;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 10px;
        }
        #gameCanvas {
            width: 350px;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB, #1e3c72);
            border: 3px solid #ffd700;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            margin: 10px auto;
            box-shadow: 0 0 25px #ffd700;
            cursor: crosshair;
        }
        #bow {
            position: absolute;
            width: 40px;
            height: 60px;
            background: #8B4513;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% 50% 0 0;
            z-index: 10;
        }
        #bow::before {
            content: '';
            position: absolute;
            width: 3px;
            height: 50px;
            background: #654321;
            left: 50%;
            top: 5px;
            transform: translateX(-50%);
        }
       .arrow {
            position: absolute;
            width: 4px;
            height: 25px;
            background: #8B4513;
            z-index: 5;
        }
       .arrow::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #C0C0C0;
            top: -12px;
            left: -4px;
        }
       .target {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
       .target-red {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ff0040, #8B0000);
            box-shadow: 0 0 15px #ff0040;
        }
       .target-gold {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            box-shadow: 0 0 20px #ffd700;
        }
       .target-small {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #00ff88, #008844);
            box-shadow: 0 0 15px #00ff88;
        }
       .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
       .controls button {
            padding: 12px 20px;
            font-size: 16px;
            background: #6a5acd;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }
        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
       .gameOverBox {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }
        #gameOverTitle {
            font-size: 32px;
            margin-bottom: 15px;
            color: #ffd700;
        }
        #finalScore {
            font-size: 24px;
            color: #00ff88;
            font-weight: bold;
        }
       .powerBar {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            display: none;
        }
       .powerFill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            border-radius: 5px;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>ARROW MASTER</h1>
        <div class="win-condition">HIT 15 TARGETS = WIN 10 COINS</div>
        <div class="stats">
            <div>SCORE: <span id="score">0</span></div>
            <div>HITS: <span id="hits">0</span>/15</div>
            <div>ARROWS: <span id="arrows">25</span></div>
            <div>⏰ <span id="timer">60</span>s</div>
        </div>
        
        <div id="gameCanvas">
            <div id="bow"></div>
            <div class="powerBar" id="powerBar">
                <div class="powerFill" id="powerFill"></div>
            </div>
        </div>
        
        <div class="controls">
            <button id="musicBtn">MUSIC: ON</button>
            <button id="restartBtn">RESTART</button>
        </div>
    </div>

    <div id="gameOver">
        <div class="gameOverBox">
            <h2 id="gameOverTitle">YOU WIN!</h2>
            <p id="finalMessage">15 Targets Hit!</p>
            <p>Coins Earned: <span id="finalScore">10</span></p>
            <button class="gameOverBtn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-epic-impact-870.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Sound FX -->
    <audio id="shootSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-arrow-whoosh-1491.mp3" type="audio/mpeg">
    </audio>
    <audio id="hitSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-arrow-impact-2053.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-completion-of-a-level-2063.mp3" type="audio/mpeg">
    </audio>
    <audio id="loseSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const bow = document.getElementById('bow');
        const scoreEl = document.getElementById('score');
        const hitsEl = document.getElementById('hits');
        const arrowsEl = document.getElementById('arrows');
        const timerEl = document.getElementById('timer');
        const powerBar = document.getElementById('powerBar');
        const powerFill = document.getElementById('powerFill');
        const musicBtn = document.getElementById('musicBtn');
        
        const bgMusic = document.getElementById('bgMusic');
        const shootSound = document.getElementById('shootSound');
        const hitSound = document.getElementById('hitSound');
        const winSound = document.getElementById('winSound');
        const loseSound = document.getElementById('loseSound');

        let score = 0;
        let hits = 0;
        let arrows = 25;
        let timeLeft = 60;
        let gameRunning = true;
        let targets = [];
        let arrowsInFlight = [];
        let power = 0;
        let charging = false;
        let musicOn = true;
        let spawnTimer;
        let gameTimer;

        bgMusic.volume = 0.2;
        document.body.addEventListener('click', () => {
            if (musicOn) bgMusic.play().catch(e => {});
        }, { once: true });

        function playSound(sound) {
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }

        function createTarget() {
            if (!gameRunning) return;
            
            const target = document.createElement('div');
            target.classList.add('target');
            
            const types = ['red', 'gold', 'small'];
            const type = types[Math.floor(Math.random() * types.length)];
            target.classList.add(`target-${type}`);
            
            target.style.left = Math.random() * 280 + 'px';
            target.style.top = '-60px';
            
            if (type === 'red') target.dataset.points = '10';
            if (type === 'gold') target.dataset.points = '20';
            if (type === 'small') target.dataset.points = '30';
            
            target.textContent = target.dataset.points;
            canvas.appendChild(target);
            
            targets.push({
                element: target,
                x: parseFloat(target.style.left),
                y: -60,
                speed: Math.random() * 2 + 3, // HARD: Fast moving
                points: parseInt(target.dataset.points)
            });
        }

        function moveTargets() {
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                t.y += t.speed;
                t.element.style.top = t.y + 'px';
                
                // Move side to side - HARD
                t.x += Math.sin(t.y / 30) * 2;
                t.element.style.left = t.x + 'px';
                
                if (t.y > 500) {
                    t.element.remove();
                    targets.splice(i, 1);
                }
            }
        }

        function startCharge(e) {
            if (!gameRunning || arrows <= 0) return;
            charging = true;
            power = 0;
            powerBar.style.display = 'block';
            chargePower();
        }

        function chargePower() {
            if (!charging) return;
            power = Math.min(power + 2, 100);
            powerFill.style.width = power + '%';
            requestAnimationFrame(chargePower);
        }

        function shootArrow(e) {
            if (!charging ||!gameRunning || arrows <= 0) return;
            
            charging = false;
            powerBar.style.display = 'none';
            arrows--;
            arrowsEl.textContent = arrows;
            playSound(shootSound);
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            const arrow = document.createElement('div');
            arrow.classList.add('arrow');
            arrow.style.left = '173px';
            arrow.style.bottom = '80px';
            canvas.appendChild(arrow);
            
            const angle = Math.atan2(mouseX - 175, 400);
            const velocity = power / 5 + 10; // HARD: Need good power
            
            arrowsInFlight.push({
                element: arrow,
                x: 173,
                y: 420,
                vx: Math.sin(angle) * velocity,
                vy: -Math.cos(angle) * velocity
            });
            
            power = 0;
            powerFill.style.width = '0%';
            
            if (arrows === 0) {
                setTimeout(checkGameOver, 2000);
            }
        }

        function moveArrows() {
            for (let i = arrowsInFlight.length - 1; i >= 0; i--) {
                let a = arrowsInFlight[i];
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.3; // Gravity
                
                a.element.style.left = a.x + 'px';
                a.element.style.top = a.y + 'px';
                
                // Check hit
                for (let j = targets.length - 1; j >= 0; j--) {
                    let t = targets[j];
                    let tx = t.x + 20;
                    let ty = t.y + 20;
                    let tw = 20;
                    
                    if (Math.abs(a.x - tx) < tw && Math.abs(a.y - ty) < tw) {
                        playSound(hitSound);
                        score += t.points;
                        hits++;
                        scoreEl.textContent = score;
                        hitsEl.textContent = hits;
                        
                        t.element.remove();
                        targets.splice(j, 1);
                        
                        if (hits >= 15) {
                            winGame();
                        }
                        break;
                    }
                }
                
                if (a.y > 500 || a.y < -50 || a.x < -50 || a.x > 400) {
                    a.element.remove();
                    arrowsInFlight.splice(i, 1);
                }
            }
        }

        function winGame() {
            gameRunning = false;
            clearInterval(spawnTimer);
            clearInterval(gameTimer);
            bgMusic.pause();
            playSound(winSound);
            
            document.getElementById('gameOverTitle').textContent = 'YOU WIN!';
            document.getElementById('finalMessage').textContent = '15 Targets Hit!';
            document.getElementById('finalScore').textContent = '10';
            
            // SEND CLAIM TO KODULAR
            if (window.AppInventor) {
                window.AppInventor.setWebViewString("CLAIM:BRICK:10");
            }
            
            document.getElementById('gameOver').style.display = 'flex';
        }

        function checkGameOver() {
            if (hits < 15 && arrows === 0) {
                loseGame();
            }
        }

        function loseGame() {
            gameRunning = false;
            clearInterval(spawnTimer);
            clearInterval(gameTimer);
            bgMusic.pause();
            playSound(loseSound);
            
            document.getElementById('gameOverTitle').textContent = 'GAME OVER';
            document.getElementById('finalMessage').textContent = `Only ${hits}/15 hits`;
            document.getElementById('finalScore').textContent = '0';
            document.getElementById('gameOver').style.display = 'flex';
        }

        function startGame() {
            spawnTimer = setInterval(createTarget, 800); // HARD: Fast spawn
            gameTimer = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    if (hits < 15) loseGame();
                }
            }, 1000);
        }

        function toggleMusic() {
            musicOn =!musicOn;
            if (musicOn) {
                bgMusic.play();
                musicBtn.textContent = 'MUSIC: ON';
            } else {
                bgMusic.pause();
                musicBtn.textContent = 'MUSIC: OFF';
            }
        }

        function gameLoop() {
            if (gameRunning) {
                moveTargets();
                moveArrows();
            }
            requestAnimationFrame(gameLoop);
        }

        // Controls
        canvas.addEventListener('mousedown', startCharge);
        canvas.addEventListener('mouseup', shootArrow);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startCharge(e);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            shootArrow(e.changedTouches[0]);
        });
        
        musicBtn.addEventListener('click', toggleMusic);
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

        // Start
        startGame();
        gameLoop();
    </script>
</body>
</html>
