<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Archery Disco - TrustRewards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #1a0033 0%, #4B0082 50%, #8A2BE2 100%);
  font-family: 'Arial Black', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
}
#gameContainer {
  background: linear-gradient(145deg, #2d1b4e, #4a2c7a);
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 20px 60px rgba(138,43,226,0.8), 0 0 40px rgba(255,0,255,0.4);
  border: 4px solid #FF00FF;
  max-width: 400px;
  width: 95%;
  animation: discoGlow 2s infinite;
}
@keyframes discoGlow {
  0%, 100% { box-shadow: 0 20px 60px rgba(138,43,226,0.8), 0 0 40px rgba(255,0,255,0.4); }
  50% { box-shadow: 0 20px 60px rgba(255,20,147,0.8), 0 0 40px rgba(0,255,255,0.4); }
}
#ui {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
  padding: 12px;
  background: linear-gradient(135deg, #FF00FF 0%, #00FFFF 100%);
  border-radius: 15px;
  color: #000;
  font-weight: 900;
  box-shadow: 0 5px 20px rgba(255,0,255,0.6);
}
#ui > div {
  text-align: center;
  font-size: 13px;
}
#timerDisplay {
  font-size: 17px;
  font-weight: 900;
  color: #FF0000;
  text-shadow: 0 0 10px rgba(255,0,0,0.8);
  animation: timerPulse 1s infinite;
}
@keyframes timerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
#musicBtn {
  background: rgba(0,0,0,0.3);
  border: 2px solid #000;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
#musicBtn:active { transform: scale(0.9); }
#gameCanvas {
  display: block;
  width: 100%;
  background: linear-gradient(to bottom, #1a0033 0%, #4B0082 60%, #8A2BE2 100%);
  border-radius: 15px;
  box-shadow: inset 0 0 30px rgba(255,0,255,0.3);
}
#gameOver {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.98);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
}
#gameOver h1 {
  font-size: 42px;
  margin-bottom: 20px;
  text-shadow: 0 0 30px #FF00FF;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
#gameOver button {
  padding: 18px 45px;
  font-size: 22px;
  background: linear-gradient(135deg, #FF00FF 0%, #00FFFF 100%);
  border: none;
  border-radius: 15px;
  color: #000;
  margin-top: 15px;
  font-weight: 900;
  box-shadow: 0 8px 30px rgba(255, 0, 255, 0.6);
}
#startScreen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  text-align: center;
  padding: 20px;
}
#startScreen h1 { 
  font-size: 42px; 
  margin-bottom: 15px; 
  background: linear-gradient(45deg, #FF00FF, #00FFFF, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: discoText 2s infinite;
}
@keyframes discoText {
  0%, 100% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(180deg); }
}
#startScreen p { font-size: 16px; margin-bottom: 10px; line-height: 1.6; }
#startScreen button {
  padding: 18px 45px;
  font-size: 22px;
  background: linear-gradient(135deg, #FF00FF 0%, #00FFFF 100%);
  border: none;
  border-radius: 15px;
  color: #000;
  font-weight: 900;
  box-shadow: 0 8px 30px rgba(255, 0, 255, 0.6);
  margin-top: 20px;
}
#powerBar {
  width: 100%;
  height: 20px;
  background: #333;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
  border: 2px solid #FF00FF;
}
#powerFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00FFFF, #FF00FF, #FFD700);
  transition: width 0.1s;
}
</style>
</head>
<body>
  <div id="startScreen">
    <h1>🕺 ARCHERY DISCO 🕺</h1>
    <p><strong>DISCO RULES:</strong></p>
    <p>⏰ Hit target <strong>5 times</strong> in <strong>1 minute</strong></p>
    <p>🏆 5+ hits = <strong>10 coins</strong> 💰</p>
    <p>💀 Less than 5 = <strong>0 coins</strong></p>
    <p>♾️ <strong>Unlimited arrows</strong> + DISCO MUSIC!</p>
    <p style="margin-top: 15px;">Tap START to drop the beat!</p>
    <button onclick="startGame()">START DISCO</button>
  </div>

  <div id="gameContainer" style="display:none;">
    <div id="ui">
      <div>💰 <span id="coinsCount">0</span></div>
      <div id="timerDisplay">⏰ <span id="timeLeft">1:00</span></div>
      <div>🎯 <span id="hitsCount">0/5</span></div>
      <div id="musicBtn" onclick="toggleMusic()">🔊</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="powerBar"><div id="powerFill"></div></div>
  </div>

  <div id="gameOver">
    <h1 id="gameOverTitle">DISCO WIN!</h1>
    <p style="font-size: 32px; color: #FF00FF; font-weight: 900; margin: 15px 0;">+<span id="earnedCoins">10</span> COINS! 💰</p>
    <p style="font-size: 18px;" id="finalMessage">5 targets smashed!</p>
    <p style="font-size: 16px;" id="finalStats">Hits: 5</p>
    <button onclick="resetGame()">DISCO AGAIN</button>
  </div>

<audio id="shootSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_b4d7b6c4c1.mp3" type="audio/mpeg">
</audio>
<audio id="hitSound">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_12b0c7443c.mp3" type="audio/mpeg">
</audio>
<audio id="winSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_946bc2bb0b.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 380;
canvas.height = 500;

let coins = parseInt(localStorage.getItem('userCoins')) || 0;
document.getElementById('coinsCount').textContent = coins;
let musicPlaying = false;

function addCoins(amount) {
  coins += amount;
  localStorage.setItem('userCoins', coins);
  document.getElementById('coinsCount').textContent = coins;
  if (window.AppInventor) {
    window.AppInventor.setWebViewString('COINS:' + coins);
  }
}

function playSound(id) {
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play().catch(e => {});
}

function toggleMusic() {
  const bgMusic = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) {
    bgMusic.pause();
    btn.textContent = '🔇';
    musicPlaying = false;
  } else {
    bgMusic.volume = 0.5;
    bgMusic.play().catch(e => {});
    btn.textContent = '🔊';
    musicPlaying = true;
  }
}

let gameRunning = false;
let timeLeft = 60;
let timerInterval = null;
let hits = 0;
let arrows = [];
let target = { x: 300, y: 250, radius: 40, speed: 2 };
let bow = { x: 50, y: 250, power: 0, charging: false };
let wind = (Math.random() - 0.5) * 1.5;

function updateTimer() {
  timeLeft--;
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timeLeft').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  if (timeLeft <= 0) {
    endGame('time');
  }
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  if (!musicPlaying) toggleMusic();
  hits = 0;
  timeLeft = 60;
  arrows = [];
  document.getElementById('hitsCount').textContent = '0/5';
  document.getElementById('timeLeft').textContent = '1:00';
  gameRunning = true;
  timerInterval = setInterval(updateTimer, 1000);
  gameLoop();
}

function drawTarget() {
  ctx.save();
  ctx.translate(target.x, target.y);
  
  ctx.beginPath();
  ctx.arc(0, 0, target.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#FFF';
  ctx.fill();
  ctx.strokeStyle = '#FF00FF';
  ctx.lineWidth = 3;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(0, 0, target.radius * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(0, 0, target.radius * 0.6, 0, Math.PI * 2);
  ctx.fillStyle = '#00FFFF';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(0, 0, target.radius * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = '#FF00FF';
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(0, 0, target.radius * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  
  ctx.restore();
}

function drawBow() {
  ctx.save();
  ctx.translate(bow.x, bow.y);
  
  ctx.beginPath();
  ctx.arc(0, 0, 30, -Math.PI/2, Math.PI/2);
  ctx.strokeStyle = '#FF00FF';
  ctx.lineWidth = 6;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(0, -30);
  ctx.lineTo(-bow.power * 0.5, 0);
  ctx.lineTo(0, 30);
  ctx.strokeStyle = '#00FFFF';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  ctx.restore();
}

function drawArrows() {
  arrows.forEach(arrow => {
    ctx.save();
    ctx.translate(arrow.x, arrow.y);
    ctx.rotate(arrow.angle);
    
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.strokeStyle = '#FF00FF';
    ctx.lineWidth = 3;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(15, -5);
    ctx.lineTo(15, 5);
    ctx.closePath();
    ctx.fillStyle = '#00FFFF';
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-15, -5);
    ctx.lineTo(-15, 5);
    ctx.closePath();
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    
    ctx.restore();
  });
}

function updateTarget() {
  target.y += target.speed;
  if (target.y > canvas.height - target.radius || target.y < target.radius) {
    target.speed *= -1;
  }
}

function updateArrows() {
  arrows = arrows.filter(arrow => {
    arrow.x += arrow.vx;
    arrow.y += arrow.vy;
    arrow.vy += 0.2;
    arrow.vx += wind * 0.08;
    
    const dx = arrow.x - target.x;
    const dy = arrow.y - target.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if (dist < target.radius && !arrow.hit) {
      arrow.hit = true;
      hits++;
      playSound('hitSound');
      document.getElementById('hitsCount').textContent = `${hits}/5`;
      if (hits >= 5) {
        endGame('win');
      }
      return false;
    }
    
    return arrow.x < canvas.width + 50 && arrow.y < canvas.height + 50;
  });
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, '#1a0033');
  gradient.addColorStop(1, '#8A2BE2');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Disco balls
  for(let i = 0; i < 3; i++) {
    ctx.fillStyle = `rgba(255,0,255,${0.3 + Math.sin(Date.now()/500 + i) * 0.2})`;
    ctx.beginPath();
    ctx.arc(100 + i*100, 60, 15, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.fillStyle = '#FF00FF';
  ctx.font = 'bold 14px Arial';
  ctx.fillText(`💨 Wind: ${wind.toFixed(1)}`, 10, 20);
}

function gameLoop() {
  if (!gameRunning) return;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  updateTarget();
  updateArrows();
  drawTarget();
  drawBow();
  drawArrows();
  
  if (bow.charging) {
    bow.power = Math.min(bow.power + 2, 100);
    document.getElementById('powerFill').style.width = bow.power + '%';
  }
  
  requestAnimationFrame(gameLoop);
}

function shoot() {
  if (!gameRunning || bow.power < 10) return;
  
  playSound('shootSound');
  const angle = Math.atan2(target.y - bow.y, target.x - bow.x);
  const speed = bow.power / 5;
  
  arrows.push({
    x: bow.x,
    y: bow.y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    angle: angle,
    hit: false
  });
  
  bow.power = 0;
  document.getElementById('powerFill').style.width = '0%';
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameRunning) return;
  bow.charging = true;
  bow.power = 0;
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!gameRunning) return;
  bow.charging = false;
  shoot();
});

canvas.addEventListener('mousedown', () => {
  if (!gameRunning) return;
  bow.charging = true;
  bow.power = 0;
});

canvas.addEventListener('mouseup', () => {
  if (!gameRunning) return;
  bow.charging = false;
  shoot();
});

function resetGame() {
  document.getElementById('gameOver').style.display = 'none';
  clearInterval(timerInterval);
  wind = (Math.random() - 0.5) * 1.5;
  startGame();
}

function endGame(reason) {
  gameRunning = false;
  clearInterval(timerInterval);
  
  if (hits >= 5) {
    playSound('winSound');
    addCoins(10);
    document.getElementById('gameOverTitle').textContent = 'DISCO WIN!';
    document.getElementById('earnedCoins').textContent = '10';
    document.getElementById('finalMessage').textContent = `${hits} targets smashed!`;
  } else {
    document.getElementById('gameOverTitle').textContent = "TIME'S UP!";
    document.getElementById('earnedCoins').textContent = '0';
    document.getElementById('finalMessage').textContent = `Only ${hits}/5 hits - Need 5 to win`;
  }
  
  document.getElementById('finalStats').textContent = `Total Hits: ${hits}`;
  document.getElementById('gameOver').style.display = 'flex';
}
</script>
</body>
</html>
