<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Match Pro - TrustRewards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  font-family: 'Arial Black', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
}
#gameContainer {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border-radius: 25px;
  padding: 15px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 50px rgba(255,215,0,0.1);
  border: 4px solid transparent;
  background-clip: padding-box;
  position: relative;
  max-width: 420px;
  width: 95%;
}
#gameContainer::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px; right: -4px; bottom: -4px;
  background: linear-gradient(45deg, #FFD700, #FFA500, #FF6B6B, #667eea);
  border-radius: 25px;
  z-index: -1;
  animation: borderGlow 3s linear infinite;
}
@keyframes borderGlow {
  0%, 100% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(180deg); }
}
#ui {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
  padding: 12px;
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
  border-radius: 18px;
  color: #000;
  font-weight: 900;
  box-shadow: 0 8px 25px rgba(255,215,0,0.6);
}
#ui > div {
  text-align: center;
  font-size: 13px;
}
#coinsDisplay { font-weight: 900; }
#timerDisplay {
  font-size: 17px;
  font-weight: 900;
  color: #D50000;
  text-shadow: 0 0 12px rgba(255,0,0,0.9);
  animation: timerPulse 1s infinite;
}
@keyframes timerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
#pairsDisplay { font-size: 13px; font-weight: 900; }
#musicBtn {
  background: rgba(0,0,0,0.3);
  border: 2px solid #000;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
}
#musicBtn:active { transform: scale(0.9); }
#gameGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px;
}
.card {
  aspect-ratio: 1;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  transition: transform 0.4s;
  transform-style: preserve-3d;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  position: relative;
}
.card:active { transform: scale(0.93); }
.card.flipped {
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
  transform: rotateY(180deg);
  box-shadow: 0 6px 25px rgba(255,215,0,0.7);
}
.card.matched {
  background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%);
  cursor: default;
  animation: matchPop 0.6s;
  box-shadow: 0 6px 25px rgba(0,255,0,0.8);
}
@keyframes matchPop {
  0% { transform: scale(1) rotateY(180deg); }
  50% { transform: scale(1.25) rotateY(180deg); }
  100% { transform: scale(1) rotateY(180deg); }
}
.card-content {
  transform: rotateY(180deg);
  backface-visibility: hidden;
}
.card-back {
  position: absolute;
  font-size: 26px;
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#gameOver {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.98);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
}
#gameOver h1 {
  font-size: 46px;
  margin-bottom: 20px;
  text-shadow: 0 0 40px #FFD700;
  animation: winPulse 1s infinite;
}
@keyframes winPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
#gameOver button {
  padding: 18px 45px;
  font-size: 22px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 15px;
  color: white;
  margin-top: 15px;
  font-weight: 900;
  box-shadow: 0 10px 35px rgba(102, 126, 234, 0.7);
}
#startScreen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.96);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  text-align: center;
  padding: 20px;
}
#startScreen h1 {
  font-size: 46px;
  margin-bottom: 15px;
  background: linear-gradient(45deg, #FFD700, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
}
#startScreen p { font-size: 16px; margin-bottom: 10px; line-height: 1.6; }
#startScreen button {
  padding: 18px 45px;
  font-size: 22px;
  background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%);
  border: none;
  border-radius: 15px;
  color: white;
  font-weight: 900;
  box-shadow: 0 10px 35px rgba(0, 255, 0, 0.7);
  margin-top: 20px;
}
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #FFD700;
  animation: confettiFall 3s linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
  <div id="startScreen">
    <h1>🧠 MEMORY PRO 🧠</h1>
    <p><strong>Rules:</strong></p>
    <p>⏰ Match all <strong>10 pairs</strong> in <strong>2 minutes</strong></p>
    <p>🏆 Win = <strong>15 coins</strong> 🎵</p>
    <p>💀 Time up = <strong>0 coins</strong></p>
    <p style="margin-top: 15px;">Tap cards to flip + enjoy the music</p>
    <button onclick="startGame()">START GAME</button>
  </div>

  <div id="gameContainer" style="display:none;">
    <div id="ui">
      <div id="coinsDisplay">💰 <span id="coinsCount">0</span></div>
      <div id="timerDisplay">⏰ <span id="timeLeft">2:00</span></div>
      <div id="pairsDisplay">🎯 <span id="pairsCount">0/10</span></div>
      <div id="musicBtn" onclick="toggleMusic()">🔊</div>
    </div>
    <div id="gameGrid"></div>
  </div>

  <div id="gameOver">
    <h1 id="gameOverTitle">YOU WIN!</h1>
    <p style="font-size: 36px; color: gold; font-weight: 900; margin: 15px 0;">+<span id="earnedCoins">15</span> COINS! 💰</p>
    <p style="font-size: 18px;" id="finalMessage">All 10 pairs matched!</p>
    <p style="font-size: 16px;" id="finalTime">Time: 0:00</p>
    <button onclick="resetGame()">PLAY AGAIN</button>
  </div>

<audio id="flipSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2a7e9d6e3c.mp3" type="audio/mpeg">
</audio>
<audio id="matchSound">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_12b0c7443c.mp3" type="audio/mpeg">
</audio>
<audio id="winSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
</audio>

<script>
let coins = parseInt(localStorage.getItem('userCoins')) || 0;
document.getElementById('coinsCount').textContent = coins;
let musicPlaying = false;

function addCoins(amount) {
  coins += amount;
  localStorage.setItem('userCoins', coins);
  document.getElementById('coinsCount').textContent = coins;
  if (window.AppInventor) {
    window.AppInventor.setWebViewString('COINS:' + coins);
  }
}

function playSound(id) {
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play().catch(e => {});
}

function toggleMusic() {
  const bgMusic = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) {
    bgMusic.pause();
    btn.textContent = '🔇';
    musicPlaying = false;
  } else {
    bgMusic.volume = 0.3;
    bgMusic.play().catch(e => {});
    btn.textContent = '🔊';
    musicPlaying = true;
  }
}

let gameRunning = false;
let timeLeft = 120;
let timerInterval = null;
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let canFlip = true;

const emojis = ['💰','💎','🚀','⭐','🏆','🎯','💵','🔥','🎮','🎁'];
const gameEmojis = [...emojis,...emojis];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function updateTimer() {
  timeLeft--;
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timeLeft').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  if (timeLeft <= 0) {
    endGame('time');
  }
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  if (!musicPlaying) toggleMusic();
  initGame();
  timeLeft = 120;
  matchedPairs = 0;
  document.getElementById('pairsCount').textContent = '0/10';
  document.getElementById('timeLeft').textContent = '2:00';
  gameRunning = true;
  timerInterval = setInterval(updateTimer, 1000);
}

function initGame() {
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  cards = [];
  flippedCards = [];
  matchedPairs = 0;
  canFlip = true;

  const shuffledEmojis = shuffle([...gameEmojis]);

  shuffledEmojis.forEach((emoji, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.emoji = emoji;
    card.dataset.index = index;
    card.innerHTML = `<div class="card-back">❓</div><div class="card-content">${emoji}</div>`;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
    cards.push(card);
  });
}

function flipCard(card) {
  if (!gameRunning ||!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

  playSound('flipSound');
  card.classList.add('flipped');
  flippedCards.push(card);

  if (flippedCards.length === 2) {
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;

  if (card1.dataset.emoji === card2.dataset.emoji) {
    playSound('matchSound');
    card1.classList.add('matched');
    card2.classList.add('matched');
    matchedPairs++;
    document.getElementById('pairsCount').textContent = `${matchedPairs}/10`;
    flippedCards = [];
    canFlip = true;

    if (matchedPairs === 10) {
      endGame('win');
    }
  } else {
    setTimeout(() => {
      card1.classList.remove('flipped');
      card2.classList.remove('flipped');
      flippedCards = [];
      canFlip = true;
    }, 800);
  }
}

function createConfetti() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }, i * 50);
  }
}

function resetGame() {
  document.getElementById('gameOver').style.display = 'none';
  clearInterval(timerInterval);
  startGame();
}

function endGame(reason) {
  gameRunning = false;
  clearInterval(timerInterval);
  const timeUsed = 120 - timeLeft;
  const minutes = Math.floor(timeUsed / 60);
  const seconds = timeUsed % 60;
  document.getElementById('finalTime').textContent = `Time: ${minutes}:${seconds.toString().padStart(2, '0')}`;

  if (reason === 'win') {
    playSound('winSound');
    addCoins(15);
    createConfetti();
    document.getElementById('gameOverTitle').textContent = 'YOU WIN!';
    document.getElementById('earnedCoins').textContent = '15';
    document.getElementById('finalMessage').textContent = 'All 10 pairs matched!';
  } else {
    document.getElementById('gameOverTitle').textContent = "TIME'S UP!";
    document.getElementById('earnedCoins').textContent = '0';
    document.getElementById('finalMessage').textContent = `You matched ${matchedPairs}/10 pairs`;
  }

  document.getElementById('gameOver').style.display = 'flex';
}
</script>
</body>
</html>
